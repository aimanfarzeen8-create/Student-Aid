kind = "web"
previewPath = "/"
title = "MedTerms — Medical Dictionary & Flashcards"
version = "1.0.0"
id = "artifacts/medical-terms"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19857

[services.development]
run = "pnpm --filter @workspace/medical-terms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medical-terms", "run", "build" ]
serve = "static"
publicDir = "artifacts/medical-terms/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19857"
BASE_PATH = "/"
